name: Deploy Stack

on:
  push:
    branches:
      - main
    paths:
      - 'Server/**'
      - 'Web/**'
      - '.dockerignore'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/LifeMeter
            git pull origin main
            docker compose down
            docker compose up -d --build
