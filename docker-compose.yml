services:
  db:
    image: postgres:17
    restart: always
    env_file:
      - ./Server/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  api:
    build: ./Server
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - ./Server/.env
    volumes:
      - ./Server/logs:/app/logs
volumes:
  pgdata: