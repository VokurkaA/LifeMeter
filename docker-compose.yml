services:
  db:
    image: postgres:17
    restart: always
    env_file:
      - ./Server/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  api:
    build: ./Server
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - ./Server/.env
    volumes:
      - ./Server/logs:/app/logs
  web:
    build:
      context: .
      dockerfile: Web/Dockerfile
    restart: always
    depends_on:
      - api
    environment:
      API_URL: http://api:3000
      NEXT_PUBLIC_API_URL: https://lifemeter.fit
      APK_STORAGE_DIR: /app/releases/apk
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: 3000
    ports:
      - "3001:3000"
    volumes:
      - ./releases/apk:/app/releases/apk:ro
volumes:
  pgdata:
